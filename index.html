<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terminal Scanner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Terminal Scanner</h1>

<input type="file" id="fileInput" accept=".xlsx,.xls">
<br><br>
<input id="input" placeholder="Scan hier barcode" disabled>

<div class="box">
    <h2 id="status">Upload Excel bestand</h2>
    <h3 id="counter">0 / 0</h3>
    <progress id="progress" value="0" max="100" style="width:80%"></progress>
  <br><br>
<button id="exportBtn" disabled>Export lijst</button>
</div>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="script.js"></script>
</body>
</html>
